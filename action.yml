name: 'Buddy Download Artifact'
description: 'Download artifacts from Buddy CI/CD platform'
author: 'Marcel Gańczarczyk'
runs:
  using: 'node24'
  main: 'dist/index.js'
inputs:
  workspace:
    description: 'Buddy workspace domain'
    required: true
  project:
    description: 'Buddy project name (URL handle)'
    required: true
  identifier:
    description: 'Artifact identifier with optional version (e.g., my-artifact or my-artifact@1.0.0)'
    required: true
  directory:
    description: 'Path to the directory to download to'
    required: true
  merge:
    description: 'Merge contents of the directory with artifact'
    required: false
  replace:
    description: 'Replace contents of the directory with artifact'
    required: false
outputs:
  artifact_path:
    description: 'The path where the artifact was downloaded'
branding:
  icon: 'download'
  color: 'blue'