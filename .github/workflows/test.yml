name: Test

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test-success:
    name: Test successful downloads
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: buddy/login@v1
        with:
          token: ${{ secrets.BUDDY_TOKEN }}
          region: 'US'
      - uses: buddy/setup@v1
        with:
          installation_method: 'npm'
          env: 'dev'

      - name: Download latest
        uses: ./
        with:
          workspace: buddy-gha-tests
          project: pipelines
          identifier: test-artifact-download
          directory: ./artifacts
      - name: Verify download
        run: |
          if [ ! -d "./artifacts" ] || [ ! -f "./artifacts/index.js" ]; then
            echo "Artifact download verification failed"
            exit 1
          fi
          echo "Artifact downloaded successfully"
          ls -la ./artifacts

      - name: Download versioned
        uses: ./
        with:
          workspace: buddy-gha-tests
          project: pipelines
          identifier: test-artifact-download@1.0.1
          directory: ./artifacts-versioned
      - name: Verify versioned download
        run: |
          if [ ! -d "./artifacts-versioned" ] || [ ! -f "./artifacts-versioned/index.js" ]; then
            echo "Versioned artifact download verification failed"
            exit 1
          fi

      - name: Download with merge
        uses: ./
        with:
          workspace: buddy-gha-tests
          project: pipelines
          identifier: test-artifact-download@1.0.0
          directory: ./artifacts-merge
          merge: true

      - name: Download with replace
        uses: ./
        with:
          workspace: buddy-gha-tests
          project: pipelines
          identifier: test-artifact-download@1.0.0
          directory: ./artifacts-replace
          replace: true

      - name: Verify BUDDY_ARTIFACT_PATH is set
        run: |
          if [ -z "$BUDDY_ARTIFACT_PATH" ]; then
            echo "BUDDY_ARTIFACT_PATH is not set"
            exit 1
          fi
          echo "BUDDY_ARTIFACT_PATH: $BUDDY_ARTIFACT_PATH"

  test-failure:
    name: Test failed downloads
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: buddy/login@v1
        with:
          token: ${{ secrets.BUDDY_TOKEN }}
          region: 'US'
      - uses: buddy/setup@v1
        with:
          installation_method: 'npm'
          env: 'dev'

      - name: Download non-existent artifact
        id: non-existent
        continue-on-error: true
        uses: ./
        with:
          workspace: buddy-gha-tests
          project: pipelines
          identifier: non-existent-artifact-${{ github.run_id }}
          directory: ./artifacts-fail
      - name: Verify non-existent artifact failed
        run: |
          [ "${{ steps.non-existent.outcome }}" == "failure" ] || exit 1
          echo "Non-existent artifact correctly failed"

      - name: Download bad version
        id: bad-version
        continue-on-error: true
        uses: ./
        with:
          workspace: buddy-gha-tests
          project: pipelines
          identifier: test-artifact-download@999.999.999
          directory: ./artifacts-bad-version
      - name: Verify bad version failed
        run: |
          [ "${{ steps.bad-version.outcome }}" == "failure" ] || exit 1
          echo "Non-existent version correctly failed"

      - name: Download from bad workspace
        id: bad-workspace
        continue-on-error: true
        uses: ./
        with:
          workspace: non-existent-workspace-${{ github.run_id }}
          project: pipelines
          identifier: test-artifact-download
          directory: ./artifacts-bad-workspace
      - name: Verify bad workspace failed
        run: |
          [ "${{ steps.bad-workspace.outcome }}" == "failure" ] || exit 1
          echo "Non-existent workspace correctly failed"

      - name: Download from bad project
        id: bad-project
        continue-on-error: true
        uses: ./
        with:
          workspace: buddy-gha-tests
          project: non-existent-project-${{ github.run_id }}
          identifier: test-artifact-download
          directory: ./artifacts-bad-project
      - name: Verify bad project failed
        run: |
          [ "${{ steps.bad-project.outcome }}" == "failure" ] || exit 1
          echo "Non-existent project correctly failed"
